---
# Playbook principal - supporte les roles DEV et PROD
# Usage DEV  : ansible-playbook -i inventory.ini playbook.yml --limit dev
# Usage PROD : ansible-playbook -i inventory.ini playbook.yml --limit prod

- name: Atelier Ansible - Deploiement avec roles DEV et PROD
  hosts: all
  become: true
  gather_facts: true

  vars:
    page_dest: /var/www/html/index.html
    yarn_repo_file: /etc/apt/sources.list.d/yarn.list
    yarn_repo_disabled_file: /etc/apt/sources.list.d/yarn.list.disabled

  tasks:
    - name: Afficher le systeme cible
      debug:
        msg:
          - "Hote cible : {{ inventory_hostname }}"
          - "Environnement : {{ env }}"
          - "OS : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Python : {{ ansible_python.executable | default('inconnu') }}"

    - name: Verifier si le depot Yarn existe
      stat:
        path: "{{ yarn_repo_file }}"
      register: yarn_repo_stat

    - name: Afficher un avertissement si le depot Yarn est present
      debug:
        msg:
          - "Un depot Yarn a ete detecte : {{ yarn_repo_file }}"
          - "Il peut provoquer un echec de apt update si sa cle GPG est absente."
      when: yarn_repo_stat.stat.exists

    - name: Desactiver temporairement le depot Yarn
      command: mv "{{ yarn_repo_file }}" "{{ yarn_repo_disabled_file }}"
      when: yarn_repo_stat.stat.exists
      changed_when: true

    - name: Mettre a jour le cache APT
      apt:
        update_cache: true

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Verifier que le repertoire web existe
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deployer la page HTML personnalisee via template Ansible
      template:
        src: files/index.html
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Redemarrer nginx

    - name: Activer nginx au demarrage
      service:
        name: nginx
        enabled: true

    - name: Demarrer nginx
      service:
        name: nginx
        state: started

    - name: Verifier que le site repond en HTTP
      uri:
        url: http://localhost
        method: GET
        status_code: 200
        return_content: true
      register: test_http
      retries: 5
      delay: 2
      until: test_http.status == 200

    - name: Afficher le code HTTP retourne
      debug:
        msg: "Le serveur repond avec le code HTTP {{ test_http.status }}"

    - name: Afficher un extrait du contenu HTTP
      debug:
        msg: "{{ test_http.content[:200] if test_http.content is defined else 'Aucun contenu retourne' }}"

  handlers:
    - name: Redemarrer nginx
      service:
        name: nginx
        state: restarted
